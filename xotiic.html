<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ XOTIIC DASHBOARD ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Raleway:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0018;
    font-family: 'Inter', 'Raleway', sans-serif;
    color: #f0d0e8;
    overflow: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #1a0030; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #ff6eb4; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #ff1493; }

/* ===== LOGIN SCREEN ===== */
.login-overlay {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: radial-gradient(ellipse at 50% 40%, #1a0030 0%, #050010 60%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: opacity 0.6s ease;
}

.login-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.login-box {
    background: linear-gradient(135deg, rgba(255,105,180,0.08), rgba(139,0,255,0.05));
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 48px;
    padding: 48px 52px;
    max-width: 440px;
    width: 90%;
    backdrop-filter: blur(24px);
    text-align: center;
    box-shadow: 0 0 60px rgba(255,105,180,0.2), 0 0 0 1px rgba(255,215,0,0.1);
    animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-icon {
    font-size: 56px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px #ff6eb4);
}

.login-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 28px;
    background: linear-gradient(135deg, #ff6eb4, #ffd700);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 4px;
}

.login-sub {
    font-size: 10px;
    color: rgba(255,215,0,0.5);
    letter-spacing: 4px;
    margin: 8px 0 32px;
    text-transform: uppercase;
}

.login-input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 30px;
    background: rgba(0,0,0,0.5);
    border: 1.5px solid rgba(255,105,180,0.3);
    color: #f0d0e8;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 14px;
    transition: all 0.3s;
}

.login-input:focus {
    border-color: #ff6eb4;
    box-shadow: 0 0 15px rgba(255,105,180,0.3);
}

.login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff6eb4, #8b00ff);
    border: none;
    color: #ffd700;
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255,105,180,0.5);
}

.login-error {
    color: #ff6060;
    font-size: 12px;
    margin-top: 14px;
    display: none;
}

/* ===== DASHBOARD ===== */
.dashboard {
    display: flex;
    height: 100vh;
    width: 100%;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.dashboard.visible {
    opacity: 1;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: linear-gradient(180deg, #0d0020 0%, #050010 100%);
    border-right: 1px solid rgba(255,105,180,0.2);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
}

.sidebar-header {
    padding: 28px 20px;
    border-bottom: 1px solid rgba(255,105,180,0.15);
    text-align: center;
}

.sidebar-header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px;
    background: linear-gradient(135deg, #ff6eb4, #ffd700);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 3px;
}

.owner-tag {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 14px;
    background: linear-gradient(135deg, rgba(255,105,180,0.2), rgba(139,0,255,0.2));
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 40px;
    font-size: 9px;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 2px;
}

.sidebar-nav {
    flex: 1;
    padding: 20px 12px;
}

.nav-section {
    margin-bottom: 24px;
}

.nav-section-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,105,180,0.5);
    padding: 8px 12px;
    margin-bottom: 6px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    margin: 2px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    color: #c8a0d0;
    font-size: 13px;
    font-weight: 500;
}

.nav-item:hover {
    background: rgba(255,105,180,0.1);
    color: #ffd700;
}

.nav-item.active {
    background: linear-gradient(135deg, rgba(255,105,180,0.15), rgba(139,0,255,0.1));
    color: #ffd700;
    border-left: 3px solid #ff6eb4;
}

.nav-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
}

/* Main Content */
.main-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    background: radial-gradient(ellipse at 30% 20%, rgba(139,0,255,0.05), transparent);
}

/* Stats Cards */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
}

.stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,105,180,0.2);
    border-radius: 24px;
    padding: 20px;
    transition: all 0.3s;
}

.stat-card:hover {
    border-color: rgba(255,215,0,0.3);
    transform: translateY(-2px);
}

.stat-value {
    font-family: 'Cinzel Decorative', serif;
    font-size: 32px;
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,105,180,0.7);
    margin-top: 6px;
}

/* Panel Container */
.panel {
    display: none;
    animation: panelFade 0.3s ease;
}

.panel.active {
    display: block;
}

@keyframes panelFade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.panel-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 24px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.3);
    margin-bottom: 6px;
}

.panel-sub {
    font-family: 'Dancing Script', cursive;
    font-size: 14px;
    color: rgba(255,105,180,0.6);
    margin-bottom: 24px;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,105,180,0.15);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
}

.card-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: #ff6eb4;
    margin-bottom: 18px;
}

/* Tables & Lists */
.data-table {
    width: 100%;
    border-collapse: collapse;
}

.data-table th {
    text-align: left;
    padding: 12px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,215,0,0.5);
    border-bottom: 1px solid rgba(255,105,180,0.2);
}

.data-table td {
    padding: 12px 8px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,105,180,0.08);
    color: #d0b0e0;
}

.data-table tr:hover td {
    background: rgba(255,105,180,0.05);
}

.delete-btn {
    background: rgba(255,0,0,0.15);
    border: 1px solid rgba(255,0,0,0.3);
    color: #ff8080;
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
}

.delete-btn:hover {
    background: rgba(255,0,0,0.3);
    transform: scale(1.02);
}

/* Inputs */
.input-field {
    width: 100%;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,0.4);
    border: 1.5px solid rgba(255,105,180,0.2);
    color: #f0d0e8;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 12px;
}

.input-field:focus {
    border-color: #ff6eb4;
}

textarea.input-field {
    resize: vertical;
    min-height: 80px;
}

.btn-primary {
    padding: 12px 24px;
    border-radius: 30px;
    background: linear-gradient(135deg, #ff6eb4, #8b00ff);
    border: none;
    color: #ffd700;
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(255,105,180,0.4);
}

.btn-danger {
    background: linear-gradient(135deg, #8b0000, #4a0000);
}

/* Log Viewer */
.log-container {
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    padding: 16px;
    font-family: 'Monaco', monospace;
    font-size: 11px;
    max-height: 500px;
    overflow-y: auto;
}

.log-entry {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,105,180,0.08);
    font-family: monospace;
    font-size: 11px;
}

.log-time {
    color: #ffd700;
    margin-right: 12px;
}

.log-type {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 9px;
    margin-right: 12px;
}

.log-type.info { background: rgba(0,200,255,0.2); color: #00ccff; }
.log-type.warning { background: rgba(255,200,0,0.2); color: #ffcc00; }
.log-type.error { background: rgba(255,0,0,0.2); color: #ff6666; }
.log-type.success { background: rgba(0,255,100,0.2); color: #00ff64; }

.log-message {
    color: #c0a0d0;
}

/* Refresh button */
.refresh-btn {
    float: right;
    background: rgba(255,105,180,0.1);
    border: 1px solid rgba(255,105,180,0.3);
    border-radius: 30px;
    padding: 6px 14px;
    font-size: 10px;
    cursor: pointer;
    color: #ff6eb4;
    transition: all 0.2s;
}

.refresh-btn:hover {
    background: rgba(255,105,180,0.2);
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 48px;
    color: rgba(255,105,180,0.4);
    font-family: 'Dancing Script', cursive;
    font-size: 14px;
}

.loader {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,105,180,0.2);
    border-top-color: #ff6eb4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 30px auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Toast */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.9);
    border: 1px solid #ff6eb4;
    border-radius: 40px;
    padding: 12px 28px;
    color: #ffd700;
    font-size: 13px;
    z-index: 10000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    backdrop-filter: blur(12px);
}

#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Logout button */
.logout-btn {
    margin: 16px;
    padding: 10px;
    border-radius: 30px;
    background: rgba(255,0,0,0.1);
    border: 1px solid rgba(255,0,0,0.3);
    color: #ff8080;
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    transition: all 0.2s;
}

.logout-btn:hover {
    background: rgba(255,0,0,0.2);
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar { width: 80px; }
    .sidebar-header h1 { font-size: 12px; letter-spacing: 1px; }
    .sidebar-header p, .owner-tag, .nav-section-title, .nav-item span:not(.nav-icon) { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
    .nav-icon { font-size: 22px; margin: 0; }
    .main-content { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Online indicator */
.online-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    background: rgba(0,255,100,0.1);
    border-radius: 30px;
    font-size: 9px;
    color: #00ff64;
    margin-left: 12px;
}

.online-dot {
    width: 6px;
    height: 6px;
    background: #00ff64;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
</style>
</head>
<body>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const API_URL = 'https://kaisworldb.onrender.com';
let authToken = null;
let activityLogs = [];




# ─── Add this new endpoint for /xotiic login ──────────────────────────────────
@app.post("/api/xotiic/login")
async def xotiic_login(payload: LoginPayload):
    """Special login endpoint for /xotiic dashboard - uses XOTIIC credentials"""
    if payload.email == XOTIIC_EMAIL and payload.password == XOTIIC_PASSWORD:
        add_log("info", f"XOTIIC login successful: {payload.email}")
        return {"access_token": "xotiic_authenticated", "token_type": "bearer", "expires_in": 86400, "role": "owner"}
    add_log("warning", f"Failed XOTIIC login attempt: {payload.email}")
    raise HTTPException(status_code=401, detail="Invalid XOTIIC credentials")

# ─── Add logging function for tracking everything ─────────────────────────────
LOG_ENTRIES = []

def add_log(level: str, message: str, details: dict = None):
    """Add entry to activity log"""
    entry = {
        "id": str(uuid.uuid4()),
        "timestamp": datetime.now(timezone.utc).isoformat(),
        "level": level,  # info, warning, error, success
        "message": message,
        "details": details
    }
    LOG_ENTRIES.insert(0, entry)
    # Keep only last 1000 logs
    while len(LOG_ENTRIES) > 1000:
        LOG_ENTRIES.pop()
    print(f"[{level.upper()}] {message}")
    return entry

@app.get("/api/xotiic/logs")
async def get_xotiic_logs(authorization: Optional[str] = Header(None)):
    """Get all activity logs - XOTIIC only"""
    if authorization != "Bearer xotiic_authenticated":
        raise HTTPException(status_code=401, detail="Unauthorized")
    return JSONResponse({"logs": LOG_ENTRIES})

@app.post("/api/xotiic/log")
async def add_xotiic_log(payload: dict, authorization: Optional[str] = Header(None)):
    """Add a log entry from frontend"""
    if authorization != "Bearer xotiic_authenticated":
        raise HTTPException(status_code=401, detail="Unauthorized")
    add_log(payload.get("level", "info"), payload.get("message", ""), payload.get("details"))
    return JSONResponse({"ok": True})
// ============================================================
// LOGIN SYSTEM (Uses backend credentials)
// ============================================================
async function attemptLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    
    if (!email || !password) {
        errorEl.textContent = '❌ fill in both fields';
        errorEl.style.display = 'block';
        return;
    }
    
    errorEl.style.display = 'none';
    
    try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        if (response.ok) {
            const data = await response.json();
            authToken = data.access_token;
            sessionStorage.setItem('xotiic_token', authToken);
            addLog('info', `Login successful - ${email}`);
            enterDashboard();
        } else {
            errorEl.textContent = '❌ invalid credentials - access denied';
            errorEl.style.display = 'block';
            addLog('error', `Failed login attempt for ${email}`);
        }
    } catch (err) {
        errorEl.textContent = '❌ connection error - check backend';
        errorEl.style.display = 'block';
        console.error('Login error:', err);
    }
}

function logout() {
    authToken = null;
    sessionStorage.removeItem('xotiic_token');
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('loginOverlay').classList.remove('hidden');
    addLog('info', 'Logged out');
}

function enterDashboard() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('dashboard').classList.add('visible');
    loadPanel('dashboard');
    startAutoRefresh();
}

// ============================================================
// LOGGING SYSTEM
// ============================================================
function addLog(type, message, details = null) {
    const entry = {
        id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        timestamp: new Date().toISOString(),
        type: type, // info, warning, error, success
        message: message,
        details: details
    };
    activityLogs.unshift(entry);
    if (activityLogs.length > 500) activityLogs.pop();
    
    // Also send to console
    console.log(`[${type.toUpperCase()}] ${message}`, details || '');
}

// ============================================================
// API HELPER
// ============================================================
async function apiCall(path, method = 'GET', body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
    
    try {
        const response = await fetch(`${API_URL}${path}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
        });
        
        if (response.status === 401) {
            addLog('error', 'Session expired - please login again');
            logout();
            return null;
        }
        
        if (!response.ok) return null;
        return await response.json();
    } catch (err) {
        addLog('error', `API error: ${path} - ${err.message}`);
        return null;
    }
}

// ============================================================
// PANEL RENDERING
// ============================================================
let currentPanel = 'dashboard';
let refreshInterval = null;

function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => {
        if (currentPanel) refreshCurrentPanel();
    }, 30000);
}

async function refreshCurrentPanel() {
    await loadPanel(currentPanel);
}

async function loadPanel(panelName) {
    currentPanel = panelName;
    const container = document.getElementById('mainContent');
    
    // Update active nav state
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.panel === panelName) item.classList.add('active');
    });
    
    addLog('info', `Loading panel: ${panelName}`);
    
    switch(panelName) {
        case 'dashboard':
            await renderDashboard(container);
            break;
        case 'logs':
            renderLogs(container);
            break;
        case 'data':
            await renderAllData(container);
            break;
        case 'threads':
            await renderThreads(container);
            break;
        case 'posts':
            await renderPosts(container);
            break;
        case 'vlogs':
            await renderVlogs(container);
            break;
        case 'journal':
            await renderJournal(container);
            break;
        case 'comments':
            await renderComments(container);
            break;
        case 'signatures':
            await renderSignatures(container);
            break;
        case 'chat':
            await renderChat(container);
            break;
        case 'profile':
            await renderProfile(container);
            break;
        case 'facts':
            await renderFacts(container);
            break;
        case 'live':
            await renderLive(container);
            break;
    }
}

                    <textarea id="profileBio" class="input-field" rows="4">${escapeHtml(profile?.bio || '')}</textarea>
                </div>
                <button class="btn-primary" onclick="saveProfile()">SAVE PROFILE ✦</button>
            </div>
        </div>
    `;
}

async function saveProfile() {
    const body = {
        name: document.getElementById('profileName')?.value || 'KAI',
        mood_emoji: document.getElementById('profileMood')?.value || null,
        location: document.getElementById('profileLocation')?.value || null,
        zodiac: document.getElementById('profileZodiac')?.value || null,
        profile_pic_url: document.getElementById('profilePic')?.value || null,
        bio: document.getElementById('profileBio')?.value || null
    };
    
    const result = await apiCall('/api/profile', 'PATCH', body);
    if (result) {
        addLog('success', 'Profile updated');
        showToast('Profile saved!');
    } else {
        showToast('Error saving profile');
    }
}

async function renderFacts(container) {
    const data = await apiCall('/api/facts');
    const facts = data?.data || [];
    
    let html = `
        <div class="panel active">
            <div class="panel-title">⭐ FUN FACTS</div>
            <div class="panel-sub">8 facts shown on the about page</div>
            <div class="card">
    `;
    
    for (let i = 1; i <= 8; i++) {
        const fact = facts.find(f => f.slot_number === i);
        html += `
            <div class="form-group">
                <label class="card-title">Fact ${i}</label>
                <input type="text" id="fact_${i}" class="input-field" value="${escapeHtml(fact?.fact_text || '')}" placeholder="Enter fun fact...">
            </div>
        `;
    }
    
    html += `<button class="btn-primary" onclick="saveAllFacts()">SAVE ALL FACTS ✦</button></div></div>`;
    container.innerHTML = html;
}

async function saveAllFacts() {
    const facts = [];
    for (let i = 1; i <= 8; i++) {
        const input = document.getElementById(`fact_${i}`);
        if (input && input.value.trim()) {
            facts.push({ slot_number: i, fact_text: input.value.trim() });
        }
    }
    
    const result = await apiCall('/api/facts', 'POST', facts);
    if (result) {
        addLog('success', `Updated ${facts.length} fun facts`);
        showToast('Facts saved!');
    } else {
        showToast('Error saving facts');
    }
}

async function renderLive(container) {
    const live = await apiCall('/api/live');
    
    container.innerHTML = `
        <div class="panel active">
            <div class="panel-title">📡 LIVE STAGE CONTROL</div>
            <div class="panel-sub">manage live streaming status</div>
            <div class="card">
                <div class="form-group">
                    <label class="card-title">Live Status</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <label class="toggle-switch">
                            <input type="checkbox" id="liveToggle" ${live?.is_live ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                        <span id="liveStatusText" style="color: ${live?.is_live ? '#00ff64' : '#ff6eb4'}">${live?.is_live ? '🔴 LIVE NOW' : '⚫ OFFLINE'}</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="card-title">Stream URL (YouTube)</label>
                    <input type="text" id="streamUrl" class="input-field" value="${escapeHtml(live?.stream_url || '')}" placeholder="https://youtube.com/watch?v=...">
                </div>
                <div class="form-group">
                    <label class="card-title">Offline Image URL</label>
                    <input type="text" id="offlineImg" class="input-field" value="${escapeHtml(live?.offline_image_url || '')}" placeholder="https://...">
                </div>
                <button class="btn-primary" onclick="saveLiveSettings()">UPDATE LIVE STATUS ✦</button>
            </div>
        </div>
    `;
    
    document.getElementById('liveToggle')?.addEventListener('change', (e) => {
        const text = document.getElementById('liveStatusText');
        if (text) {
            text.textContent = e.target.checked ? '🔴 LIVE NOW' : '⚫ OFFLINE';
            text.style.color = e.target.checked ? '#00ff64' : '#ff6eb4';
        }
    });
}

async function saveLiveSettings() {
    const body = {
        is_live: document.getElementById('liveToggle')?.checked || false,
        stream_url: document.getElementById('streamUrl')?.value.trim() || null,
        offline_image_url: document.getElementById('offlineImg')?.value.trim() || null
    };
    
    const result = await apiCall('/api/live', 'PATCH', body);
    if (result) {
        addLog('success', body.is_live ? 'Went LIVE' : 'Ended live stream');
        showToast(body.is_live ? '🔴 You are now LIVE!' : 'Stream ended');
    } else {
        showToast('Error updating live status');
    }
}

// ============================================================
// UTILITIES
// ============================================================
function formatDate(iso) {
    if (!iso) return 'N/A';
    try {
        return new Date(iso).toLocaleString();
    } catch(e) {
        return iso;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
